<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
  <title>Nearby Farmers - AgriConnect Nepal</title>
  <link rel="stylesheet" href="css/main.css"><link rel="stylesheet" href="css/components.css"><link rel="stylesheet" href="css/animations.css"><link rel="stylesheet" href="css/responsive.css">
</head>
<body>
  <header id="navbar" class="navbar"></header>
  <main style="margin-top:var(--navbar-height);padding:24px 0;min-height:80vh">
    <div class="container">
      <div class="breadcrumb mb-4"><a href="index.html">Home</a><span class="separator">/</span><span class="current">Nearby Farmers</span></div>
      <div class="flex justify-between items-center mb-6 flex-wrap gap-4">
        <div><h1 style="font-size:1.6rem">📍 Nearby Farmers</h1><p class="text-muted">Find farmers near you for Arma Parma exchanges</p></div>
      </div>
      <div class="flex gap-6" style="align-items:flex-start">
        <aside style="width:280px;flex-shrink:0;position:sticky;top:calc(var(--navbar-height)+16px)">
          <div class="card">
            <div class="card-header"><h4 style="margin:0">🔍 Filters</h4></div>
            <div class="card-body">
              <div class="form-group mb-4">
                <label class="form-label">Distance</label>
                <select id="distanceFilter" class="form-select" onchange="NearbyFarmers.filter()">
                  <option value="5">Within 5 km</option>
                  <option value="10" selected>Within 10 km</option>
                  <option value="20">Within 20 km</option>
                  <option value="50">Within 50 km</option>
                  <option value="">Any distance</option>
                </select>
              </div>
              <div class="form-group mb-4">
                <label class="form-label">Looking For</label>
                <select id="lookingForFilter" class="form-select" onchange="NearbyFarmers.filter()">
                  <option value="">All</option>
                  <option value="worker">Workers (Need Help)</option>
                  <option value="exchange">Arma Parma Exchange</option>
                  <option value="both">Both</option>
                </select>
              </div>
              <div class="form-group mb-4">
                <label class="form-label">Crops</label>
                <div id="cropFilters" class="flex flex-wrap gap-2"></div>
              </div>
              <div class="form-group">
                <label class="form-label">Sort By</label>
                <select id="sortByFilter" class="form-select" onchange="NearbyFarmers.filter()">
                  <option value="distance">Nearest First</option>
                  <option value="rating">Highest Rated</option>
                  <option value="credits">Most Credits</option>
                </select>
              </div>
            </div>
          </div>
        </aside>
        <div style="flex:1;min-width:0">
          <div id="nearbyCount" class="text-muted mb-4"></div>
          <div id="nearbyList" class="grid grid-auto gap-4"></div>
        </div>
      </div>
    </div>
  </main>
  <footer id="footer" class="footer"></footer>
  <script src="js/data.js"></script><script src="https://unpkg.com/@supabase/supabase-js@2"></script><script src="js/supabase-auth.js"></script><script src="js/auth-system.js"></script><script src="js/auth.js"></script><script src="js/utils.js"></script><script src="js/app.js"></script>
  <script src="js/nearby-farmers.js"></script>
</body>
</html>
