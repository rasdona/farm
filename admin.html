<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
  <title>Admin Panel - AgriConnect Nepal</title>
  <link rel="stylesheet" href="css/main.css"><link rel="stylesheet" href="css/components.css"><link rel="stylesheet" href="css/dashboard.css"><link rel="stylesheet" href="css/animations.css"><link rel="stylesheet" href="css/responsive.css">
</head>
<body>
  <header id="navbar" class="navbar"></header>
  <div class="admin-layout">
    <aside class="admin-sidebar" id="adminNav"></aside>
    <main class="admin-main" id="adminContent"></main>
  </div>
  <div class="modal-backdrop" id="adminModal">
    <div class="modal"><div class="modal-header"><h3>Modal</h3><span class="modal-close" onclick="Utils.hideModal('adminModal')">×</span></div><div class="modal-body"></div><div class="modal-footer"></div></div>
  </div>
  <div class="back-to-top">↑</div>
  <script src="js/data.js"></script><script src="js/utils.js"></script><script src="js/auth-system.js"></script><script src="js/auth.js"></script><script src="js/app.js"></script><script src="js/admin.js"></script>
  <script>
    App.init();
    if (!Auth.requireAuth() || !Auth.isAdmin()) { Utils.toast('Access denied.', 'error'); setTimeout(() => { window.location.href = 'index.html'; }, 500); }
    else { Admin.init(); }
  </script>
</body>
</html>
