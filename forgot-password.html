<!DOCTYPE html>
<html lang="ne" data-theme="light">
<head>
  <meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
  <title>पासवर्ड रिसेट - KrishiConnect Nepal</title>
  <link rel="stylesheet" href="css/main.css"><link rel="stylesheet" href="css/components.css"><link rel="stylesheet" href="css/animations.css"><link rel="stylesheet" href="css/responsive.css">
  <link rel="stylesheet" href="css/auth.css">
</head>
<body>
  <header id="navbar" class="navbar"></header>
  <main class="auth-page">
    <div class="auth-container">
      <div class="auth-card">
        <div class="auth-header">
          <a href="index.html" class="auth-brand">
            <span class="auth-brand-icon">🌱</span>
            <span>KrishiConnect</span>
          </a>
          <div class="auth-otp-icon">🔑</div>
          <h1 class="auth-title" id="pageTitle">पासवर्ड रिसेट</h1>
          <p class="auth-subtitle" id="pageSubtitle">फोन नम्बर लेख्नुहोस्, हामी OTP पठाउँछौं</p>
        </div>

        <div id="fpError" class="auth-alert auth-alert-error hidden"></div>
        <div id="fpSuccess" class="auth-alert auth-alert-success hidden"></div>

        <!-- Step 1: Enter phone -->
        <div id="fpStep1" class="auth-form-step active">
          <form class="auth-form" onsubmit="return handleFpStep1(event)">
            <div class="auth-input-group">
              <label class="auth-label">फोन नम्बर <span class="required">*</span></label>
              <div class="auth-input-wrapper">
                <span class="auth-input-icon">📱</span>
                <input type="tel" class="auth-input" id="fpPhone" placeholder="98XXXXXXXX" required pattern="[9][0-9]{9}" maxlength="10">
              </div>
            </div>
            <button type="submit" class="auth-btn auth-btn-primary auth-btn-lg auth-btn-block" id="fpSendBtn">OTP पठाउनुहोस् →</button>
          </form>
        </div>

        <!-- Step 2: Enter OTP -->
        <div id="fpStep2" class="auth-form-step">
          <form class="auth-form" onsubmit="return handleFpStep2(event)">
            <div class="auth-otp-inputs" id="fpOtpInputs">
              <input type="text" class="auth-otp-input" maxlength="1" inputmode="numeric" pattern="[0-9]" data-otp="0" autofocus>
              <input type="text" class="auth-otp-input" maxlength="1" inputmode="numeric" pattern="[0-9]" data-otp="1">
              <input type="text" class="auth-otp-input" maxlength="1" inputmode="numeric" pattern="[0-9]" data-otp="2">
              <input type="text" class="auth-otp-input" maxlength="1" inputmode="numeric" pattern="[0-9]" data-otp="3">
              <input type="text" class="auth-otp-input" maxlength="1" inputmode="numeric" pattern="[0-9]" data-otp="4">
              <input type="text" class="auth-otp-input" maxlength="1" inputmode="numeric" pattern="[0-9]" data-otp="5">
            </div>
            <button type="submit" class="auth-btn auth-btn-primary auth-btn-lg auth-btn-block auth-mt-4">सत्यापन गर्नुहोस्</button>
          </form>
          <div class="auth-mt-4 auth-text-center">
            <button type="button" class="auth-btn auth-btn-ghost" id="fpResendBtn" onclick="resendFpOtp()" disabled>पुन: पठाउनुहोस्</button>
          </div>
        </div>

        <!-- Step 3: New password -->
        <div id="fpStep3" class="auth-form-step">
          <form class="auth-form" onsubmit="return handleFpStep3(event)">
            <div class="auth-input-group">
              <label class="auth-label">नयाँ पासवर्ड <span class="required">*</span></label>
              <div class="auth-input-wrapper">
                <span class="auth-input-icon">🔒</span>
                <input type="password" class="auth-input" id="fpNewPassword" placeholder="कम्तिमा ८ अक्षर" required minlength="8">
                <button type="button" class="auth-toggle-pwd" onclick="togglePwVisibility('fpNewPassword', this)">👁️</button>
              </div>
              <div class="auth-pwd-strength" id="fpPwdStrength"><div class="auth-pwd-strength-fill" id="fpPwdFill"></div></div>
              <div class="auth-pwd-strength-label" id="fpPwdLabel"></div>
            </div>
            <div class="auth-input-group">
              <label class="auth-label">पासवर्ड पुष्टि <span class="required">*</span></label>
              <div class="auth-input-wrapper">
                <span class="auth-input-icon">🔒</span>
                <input type="password" class="auth-input" id="fpConfirmPwd" placeholder="पासवर्ड फेरि लेख्नुहोस्" required>
              </div>
            </div>
            <button type="submit" class="auth-btn auth-btn-primary auth-btn-lg auth-btn-block" id="fpResetBtn">पासवर्ड रिसेट गर्नुहोस्</button>
          </form>
        </div>

        <!-- Step 4: Success -->
        <div id="fpStep4" class="auth-form-step">
          <div class="auth-success-box">
            <div class="auth-success-icon">✅</div>
            <h2>पासवर्ड सफलतापूर्वक रिसेट भयो!</h2>
            <p>अब नयाँ पासवर्डले लगइन गर्न सक्नुहुन्छ।</p>
            <a href="login.html" class="auth-btn auth-btn-primary auth-btn-lg auth-mt-4">लगइन गर्नुहोस् →</a>
          </div>
        </div>

        <div class="auth-mt-4 auth-text-center">
          <a href="login.html" class="auth-link">← लगइन पेजमा फर्कनुहोस्</a>
        </div>
      </div>
    </div>
  </main>
  <script src="js/data.js"></script><script src="js/utils.js"></script><script src="js/email-service.js"></script><script src="js/auth-system.js"></script><script src="js/auth.js"></script><script src="js/app.js"></script>
  <script>
    let fpResendTimer = null;

    document.addEventListener('DOMContentLoaded', function() {
      App.init();
      const urlStep = new URLSearchParams(window.location.search).get('step');
      if (urlStep === 'newpassword') showFpStep(3);
      setupFpOtpInputs();
    });

    function showFpStep(step) {
      document.querySelectorAll('#fpStep1,#fpStep2,#fpStep3,#fpStep4').forEach((s, i) => {
        s.classList.toggle('active', i + 1 === step);
      });
    }

    async function handleFpStep1(e) {
      e.preventDefault();
      const phone = document.getElementById('fpPhone').value.trim();
      if (!phone || !/^[9][0-9]{9}$/.test(phone)) { showFpError('मान्य फोन नम्बर लेख्नुहोस्'); return false; }
      const btn = document.getElementById('fpSendBtn');
      btn.disabled = true; btn.textContent = 'पठाइँदैछ...';
      const result = await AuthSystem.sendPasswordResetOtp(phone);
      btn.disabled = false; btn.textContent = 'OTP पठाउनुहोस् →';
      if (result.success) {
        sessionStorage.setItem('agri_resetUserId', result.userId);
        showFpSuccess('OTP पठाइयो!');
        document.getElementById('pageSubtitle').textContent = `${phone.replace(/(\d{3})(\d{3})(\d{4})/, '$1-$2-$3')} मा OTP पठाइयो`;
        console.log('[Password Reset] OTP sent to:', phone);
        showFpStep(2);
        startFpResendTimer();
      } else {
        showFpError(result.message);
      }
      return false;
    }

    function handleFpStep2(e) {
      e.preventDefault();
      const otp = Array.from(document.querySelectorAll('#fpStep2 .auth-otp-input')).map(i => i.value).join('');
      if (otp.length !== 6) { showFpError('६ अंकको OTP लेख्नुहोस्'); return false; }
      const userId = sessionStorage.getItem('agri_resetUserId');
      const result = AuthSystem.verifyPasswordResetOtp(userId, otp);
      if (result.success) { showFpSuccess('OTP सत्यापित भयो!'); showFpStep(3); }
      else { showFpError(result.message); document.querySelectorAll('#fpStep2 .auth-otp-input').forEach(i => i.value = ''); }
      return false;
    }

    async function handleFpStep3(e) {
      e.preventDefault();
      const newPwd = document.getElementById('fpNewPassword').value;
      const confirmPwd = document.getElementById('fpConfirmPwd').value;
      if (newPwd.length < 8) { showFpError('पासवर्ड कम्तिमा ८ अक्षरको हुनुपर्छ'); return false; }
      if (!/[A-Z]/.test(newPwd) || !/[a-z]/.test(newPwd) || !/[0-9]/.test(newPwd) || !/[!@#$%^&*(),.?":{}|<>]/.test(newPwd)) { showFpError('पासवर्डमा ठूलो/सानो अक्षर, अंक, र विशेष चिह्न चाहिन्छ'); return false; }
      if (newPwd !== confirmPwd) { showFpError('पासवर्ड मिल्दैन'); return false; }
      const userId = sessionStorage.getItem('agri_resetUserId');
      const btn = document.getElementById('fpResetBtn');
      btn.disabled = true; btn.textContent = 'रिसेट हुँदैछ...';
      const result = await AuthSystem.resetPassword(userId, newPwd);
      btn.disabled = false; btn.textContent = 'पासवर्ड रिसेट गर्नुहोस्';
      if (result.success) { showFpStep(4); sessionStorage.removeItem('agri_resetUserId'); }
      else { showFpError(result.message); }
      return false;
    }

    async function resendFpOtp() {
      const phone = document.getElementById('fpPhone').value.trim();
      if (!phone) return;
      const result = await AuthSystem.sendPasswordResetOtp(phone);
      if (result.success) { showFpSuccess('नयाँ OTP पठाइयो!'); startFpResendTimer(); }
    }

    function startFpResendTimer() {
      let sec = 60;
      const btn = document.getElementById('fpResendBtn');
      btn.disabled = true;
      if (fpResendTimer) clearInterval(fpResendTimer);
      fpResendTimer = setInterval(() => {
        sec--;
        btn.textContent = `पुन: पठाउनुहोस् (${sec}s)`;
        if (sec <= 0) { clearInterval(fpResendTimer); btn.disabled = false; btn.textContent = 'पुन: पठाउनुहोस्'; }
      }, 1000);
    }

    function setupFpOtpInputs() {
      const inputs = document.querySelectorAll('#fpOtpInputs .auth-otp-input');
      inputs.forEach((input, i) => {
        input.addEventListener('input', function() {
          this.value = this.value.replace(/[^0-9]/g, '');
          if (this.value && i < inputs.length - 1) inputs[i + 1].focus();
        });
        input.addEventListener('keydown', function(e) {
          if (e.key === 'Backspace' && !this.value && i > 0) { inputs[i-1].focus(); inputs[i-1].value = ''; }
        });
      });
    }

    function togglePwVisibility(id, btn) {
      const input = document.getElementById(id);
      input.type = input.type === 'password' ? 'text' : 'password';
      btn.textContent = input.type === 'password' ? '👁️' : '🙈';
    }

    function showFpError(msg) { const el = document.getElementById('fpError'); el.textContent = msg; el.classList.remove('hidden'); document.getElementById('fpSuccess').classList.add('hidden'); }
    function showFpSuccess(msg) { const el = document.getElementById('fpSuccess'); el.textContent = msg; el.classList.remove('hidden'); document.getElementById('fpError').classList.add('hidden'); }
  </script>
</body>
</html>
