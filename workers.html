<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
  <title>Find Workers - AgriConnect Nepal</title>
  <link rel="stylesheet" href="css/main.css"><link rel="stylesheet" href="css/components.css"><link rel="stylesheet" href="css/animations.css"><link rel="stylesheet" href="css/responsive.css">
</head>
<body>
  <header id="navbar" class="navbar"></header>
  <main style="margin-top:var(--navbar-height);padding:24px 0;min-height:80vh">
    <div class="container">
      <div class="breadcrumb mb-4"><a href="index.html">Home</a><span class="separator">/</span><span class="current">Find Workers</span></div>
      <div class="flex justify-between items-center mb-6 flex-wrap gap-4">
        <div><h1 style="font-size:1.6rem">Find Agricultural Workers</h1><p class="text-muted" id="workerCount"></p></div>
        <div class="flex gap-2">
          <select class="form-select" id="workerSort" style="width:auto" onchange="applyWorkerFilters()">
            <option value="">Newest</option><option value="rating">Top Rated</option><option value="experience">Most Experienced</option><option value="wage-low">Lowest Wage</option><option value="wage-high">Highest Wage</option>
          </select>
          <button class="btn btn-outline" onclick="document.querySelector('.filter-sidebar').classList.toggle('show')">🔧 Filters</button>
        </div>
      </div>
      <div class="flex gap-6" style="align-items:flex-start">
        <aside class="filter-sidebar" style="width:280px;flex-shrink:0;position:sticky;top:calc(var(--navbar-height)+16px)">
          <div class="flex justify-between items-center mb-4"><h4 style="margin:0">Filters</h4><span class="filter-clear" onclick="clearWorkerFilters()">Clear All</span></div>
          <div class="filter-group"><label>Search</label><input type="text" id="wFilterQ" placeholder="Name or skill..." oninput="applyWorkerFilters()"></div>
          <div class="filter-group"><label>District</label><select id="wFilterDistrict" onchange="applyWorkerFilters()"></select></div>
          <div class="filter-group"><label>Min Experience (years)</label><input type="number" id="wFilterExp" placeholder="e.g. 3" min="0" oninput="applyWorkerFilters()"></div>
          <div class="filter-group"><label>Max Daily Wage (NPR)</label><input type="number" id="wFilterWage" placeholder="e.g. 1500" oninput="applyWorkerFilters()"></div>
          <div class="filter-group">
            <label class="form-check"><input type="checkbox" id="wFilterVerified" onchange="applyWorkerFilters()"><span>✅ Verified Only</span></label>
          </div>
        </aside>
        <div style="flex:1;min-width:0">
          <div class="grid grid-auto gap-6" id="workerList"></div>
        </div>
      </div>
    </div>
  </main>
  <footer id="footer" class="footer"></footer>
  <div class="back-to-top">↑</div>
  <script src="js/data.js"></script><script src="js/utils.js"></script><script src="https://unpkg.com/@supabase/supabase-js@2"></script><script src="js/supabase-auth.js"></script><script src="js/auth-system.js"></script><script src="js/auth.js"></script><script src="js/app.js"></script><script src="js/workers.js"></script>
  <script>
    App.init();
    document.getElementById('wFilterDistrict').innerHTML = Jobs.getDistrictOptions();
    function applyWorkerFilters() {
      const filters = {
        q: document.getElementById('wFilterQ').value,
        district: document.getElementById('wFilterDistrict').value,
        experience: document.getElementById('wFilterExp').value,
        wageMax: document.getElementById('wFilterWage').value,
        verified: document.getElementById('wFilterVerified').checked,
        sort: document.getElementById('workerSort').value
      };
      const workers = Workers.searchWorkers(filters);
      document.getElementById('workerCount').textContent = `${workers.length} worker${workers.length !== 1 ? 's' : ''} found`;
      Workers.renderWorkerList('workerList', workers);
    }
    function clearWorkerFilters() {
      document.getElementById('wFilterQ').value = '';
      document.getElementById('wFilterDistrict').value = '';
      document.getElementById('wFilterExp').value = '';
      document.getElementById('wFilterWage').value = '';
      document.getElementById('wFilterVerified').checked = false;
      applyWorkerFilters();
    }
    applyWorkerFilters();
  </script>
</body>
</html>
