<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
  <title>Contact Us - AgriConnect Nepal</title>
  <link rel="stylesheet" href="css/main.css"><link rel="stylesheet" href="css/components.css"><link rel="stylesheet" href="css/animations.css"><link rel="stylesheet" href="css/responsive.css">
</head>
<body>
  <header id="navbar" class="navbar"></header>
  <main style="margin-top:var(--navbar-height);padding:40px 0;min-height:80vh">
    <div class="container">
      <div class="section-header"><h2>Contact Us</h2><p>Have questions? We'd love to hear from you.</p></div>
      <div class="grid grid-2 gap-8" style="max-width:1000px;margin:0 auto">
        <div class="card">
          <div class="card-body p-8">
            <h3 class="mb-6">Send a Message</h3>
            <form onsubmit="event.preventDefault();Utils.toast('Message sent! We will get back to you soon.');this.reset();">
              <div class="form-row">
                <div class="form-group"><label class="form-label">Name</label><input class="form-input" required placeholder="Your name"></div>
                <div class="form-group"><label class="form-label">Email</label><input class="form-input" type="email" required placeholder="Your email"></div>
              </div>
              <div class="form-group"><label class="form-label">Subject</label><input class="form-input" required placeholder="How can we help?"></div>
              <div class="form-group"><label class="form-label">Message</label><textarea class="form-textarea" rows="5" required placeholder="Write your message..."></textarea></div>
              <button type="submit" class="btn btn-primary btn-block">Send Message</button>
            </form>
          </div>
        </div>
        <div>
          <div class="card mb-4"><div class="card-body p-6"><h4 class="mb-4">📧 Email</h4><p class="text-muted">support@agrinepal.com</p></div></div>
          <div class="card mb-4"><div class="card-body p-6"><h4 class="mb-4">📞 Phone</h4><p class="text-muted">+977-1-4XXXXXX</p></div></div>
          <div class="card mb-4"><div class="card-body p-6"><h4 class="mb-4">📍 Address</h4><p class="text-muted">Kathmandu, Nepal</p></div></div>
          <div class="card"><div class="card-body p-6"><h4 class="mb-4">🕐 Support Hours</h4><p class="text-muted">Sun - Fri: 9 AM - 6 PM NPT</p></div></div>
        </div>
      </div>
    </div>
  </main>
  <footer id="footer" class="footer"></footer>
  <script src="js/data.js"></script><script src="js/utils.js"></script><script src="js/auth-system.js"></script><script src="js/auth.js"></script><script src="js/app.js"></script>
  <script>App.init();</script>
</body>
</html>
