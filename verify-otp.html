<!DOCTYPE html>
<html lang="ne">
<head>
  <meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
  <title>OTP सत्यापन - KrishiConnect Nepal</title>
  <link rel="stylesheet" href="css/main.css"><link rel="stylesheet" href="css/components.css"><link rel="stylesheet" href="css/animations.css"><link rel="stylesheet" href="css/responsive.css">
  <link rel="stylesheet" href="css/auth.css">
</head>
<body>
  <header id="navbar" class="navbar"></header>
  <main class="auth-page">
    <div class="auth-container">
      <div class="auth-card">
        <div class="auth-header">
          <a href="index.html" class="auth-brand">
            <span class="auth-brand-icon">🌱</span>
            <span>KrishiConnect</span>
          </a>
          <div class="auth-otp-icon">📱</div>
          <h1 class="auth-title">OTP सत्यापन</h1>
          <p class="auth-subtitle" id="otpSubtitle">तपाईंको फोन नम्बरमा ६ अंकको कोड पठाइएको छ</p>
          <p class="auth-phone-display" id="otpPhone"></p>
        </div>

        <div id="otpError" class="auth-alert auth-alert-error hidden"></div>
        <div id="otpSuccess" class="auth-alert auth-alert-success hidden"></div>

        <form id="otpForm" class="auth-form" onsubmit="return handleOtpVerify(event)">
          <div class="auth-otp-inputs" id="otpInputs">
            <input type="text" class="auth-otp-input" maxlength="1" inputmode="numeric" pattern="[0-9]" data-otp="0" autofocus>
            <input type="text" class="auth-otp-input" maxlength="1" inputmode="numeric" pattern="[0-9]" data-otp="1">
            <input type="text" class="auth-otp-input" maxlength="1" inputmode="numeric" pattern="[0-9]" data-otp="2">
            <input type="text" class="auth-otp-input" maxlength="1" inputmode="numeric" pattern="[0-9]" data-otp="3">
            <input type="text" class="auth-otp-input" maxlength="1" inputmode="numeric" pattern="[0-9]" data-otp="4">
            <input type="text" class="auth-otp-input" maxlength="1" inputmode="numeric" pattern="[0-9]" data-otp="5">
          </div>

          <button type="submit" class="auth-btn auth-btn-primary auth-btn-lg auth-btn-block auth-mt-4" id="otpVerifyBtn">
            <span id="otpBtnText">सत्यापन गर्नुहोस्</span>
            <span id="otpBtnLoader" class="auth-spinner hidden"></span>
          </button>
        </form>

        <div class="auth-mt-4 auth-text-center">
          <p class="auth-text-muted">कोड आएन?</p>
          <button type="button" class="auth-btn auth-btn-ghost auth-mt-2" id="resendBtn" onclick="resendOtp()" disabled>
            <span id="resendText">पुन: पठाउनुहोस् (६० सेकेन्ड)</span>
          </button>
        </div>

        <div class="auth-mt-4 auth-text-center">
          <a href="login.html" class="auth-link">← लगइन पेजमा फर्कनुहोस्</a>
        </div>
      </div>
    </div>
  </main>
  <script src="js/data.js"></script><script src="js/utils.js"></script><script src="https://unpkg.com/@supabase/supabase-js@2"></script><script src="js/supabase-auth.js"></script><script src="js/auth-system.js"></script><script src="js/auth.js"></script><script src="js/app.js"></script>
  <script>
    let resendTimer = null;
    let attemptCount = 0;
    const maxAttempts = 5;
    const otpType = new URLSearchParams(window.location.search).get('type') || 'phone';
    const otpPhone = new URLSearchParams(window.location.search).get('phone') || '';

    document.addEventListener('DOMContentLoaded', function() {
      App.init();
      document.getElementById('otpPhone').textContent = otpPhone ? otpPhone.replace(/(\d{3})(\d{3})(\d{4})/, '$1-$2-$3') : '';
      setupOtpInputs();
      startResendTimer();
    });

    function setupOtpInputs() {
      const inputs = document.querySelectorAll('.auth-otp-input');
      inputs.forEach((input, i) => {
        input.addEventListener('input', function() {
          this.value = this.value.replace(/[^0-9]/g, '');
          if (this.value && i < inputs.length - 1) inputs[i + 1].focus();
          if (i === inputs.length - 1 && this.value) verifyOtp();
        });
        input.addEventListener('keydown', function(e) {
          if (e.key === 'Backspace' && !this.value && i > 0) { inputs[i - 1].focus(); inputs[i - 1].value = ''; }
          if (e.key === 'Enter') { e.preventDefault(); verifyOtp(); }
        });
        input.addEventListener('paste', function(e) {
          e.preventDefault();
          const pasted = (e.clipboardData || window.clipboardData).getData('text').replace(/[^0-9]/g, '').slice(0, 6);
          pasted.split('').forEach((char, j) => { if (inputs[j]) inputs[j].value = char; });
          if (pasted.length > 0) inputs[Math.min(pasted.length, inputs.length) - 1].focus();
          if (pasted.length === 6) setTimeout(verifyOtp, 100);
        });
      });
    }

    function getOtpValue() {
      return Array.from(document.querySelectorAll('.auth-otp-input')).map(i => i.value).join('');
    }

    function verifyOtp() {
      const otp = getOtpValue();
      if (otp.length !== 6) return;
      if (attemptCount >= maxAttempts) { showOtpError('धेरै पटक प्रयास भयो। कृपया फेरि प्रयास गर्नुहोस्'); return; }

      showOtpLoading(true);
      setTimeout(() => {
        let result;
        if (otpType === 'password_reset') {
          result = AuthSystem.verifyPasswordResetOtp(sessionStorage.getItem('agri_resetUserId'), otp);
        } else {
          result = AuthSystem.verifyPhone(otp);
        }
        showOtpLoading(false);

        if (result.success) {
          showOtpSuccess('सत्यापन सफल भयो!');
          if (otpType === 'password_reset') {
            setTimeout(() => { window.location.href = 'forgot-password.html?step=newpassword'; }, 1000);
          } else {
            setTimeout(() => { window.location.href = Auth.getDashboardUrl(); }, 1000);
          }
        } else {
          attemptCount++;
          showOtpError(result.message);
          document.querySelectorAll('.auth-otp-input').forEach(i => { i.value = ''; });
          document.querySelector('.auth-otp-input').focus();
        }
      }, 800);
    }

    async function resendOtp() {
      if (!otpPhone) return;
      showOtpLoading(true);
      let result;
      if (otpType === 'password_reset') {
        result = await AuthSystem.sendPasswordResetOtp(otpPhone);
      } else {
        const user = DB.getUserByPhone(otpPhone);
        if (user) result = await AuthSystem.sendPhoneOtp(user.id);
      }
      showOtpLoading(false);
      if (result && result.success) {
        showOtpSuccess('नयाँ OTP पठाइयो!');
        startResendTimer();
      }
    }

    function startResendTimer() {
      let sec = 60;
      const btn = document.getElementById('resendBtn');
      const text = document.getElementById('resendText');
      btn.disabled = true;
      if (resendTimer) clearInterval(resendTimer);
      resendTimer = setInterval(() => {
        sec--;
        text.textContent = `पुन: पठाउनुहोस् (${sec} सेकेन्ड)`;
        if (sec <= 0) { clearInterval(resendTimer); btn.disabled = false; text.textContent = 'पुन: पठाउनुहोस्'; }
      }, 1000);
    }

    function showOtpError(msg) { const el = document.getElementById('otpError'); el.textContent = msg; el.classList.remove('hidden'); document.getElementById('otpSuccess').classList.add('hidden'); }
    function showOtpSuccess(msg) { const el = document.getElementById('otpSuccess'); el.textContent = msg; el.classList.remove('hidden'); document.getElementById('otpError').classList.add('hidden'); }
    function showOtpLoading(show) {
      document.getElementById('otpVerifyBtn').disabled = show;
      document.getElementById('otpBtnText').textContent = show ? 'सत्यापन हुँदैछ...' : 'सत्यापन गर्नुहोस्';
      document.getElementById('otpBtnLoader').classList.toggle('hidden', !show);
    }
  </script>
</body>
</html>
