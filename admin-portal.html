<!DOCTYPE html>
<html lang="ne" data-theme="light">
<head>
  <meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
  <title>Admin Portal - KrishiConnect Nepal</title>
  <link rel="stylesheet" href="css/main.css"><link rel="stylesheet" href="css/components.css"><link rel="stylesheet" href="css/animations.css"><link rel="stylesheet" href="css/responsive.css">
  <link rel="stylesheet" href="css/auth.css">
</head>
<body>
  <header id="navbar" class="navbar"></header>
  <main class="auth-page">
    <div class="auth-container">
      <div class="auth-card">
        <div class="auth-header">
          <a href="index.html" class="auth-brand">
            <span class="auth-brand-icon">🛡️</span>
            <span>KrishiConnect Admin</span>
          </a>
          <h1 class="auth-title" id="adminTitle">एडमिन लगइन</h1>
          <p class="auth-subtitle" id="adminSubtitle">दुई-कारक प्रमाणीकरण आवश्यक छ</p>
        </div>

        <div id="adminError" class="auth-alert auth-alert-error hidden"></div>
        <div id="adminSuccess" class="auth-alert auth-alert-success hidden"></div>

        <!-- Step 1: Credentials -->
        <div id="adminStep1" class="auth-form-step active">
          <form class="auth-form" onsubmit="return handleAdminLogin(event)">
            <div class="auth-input-group">
              <label class="auth-label">एडमिन आईडी <span class="required">*</span></label>
              <div class="auth-input-wrapper">
                <span class="auth-input-icon">🛡️</span>
                <input type="text" class="auth-input" id="adminId" placeholder="98XXXXXXXX वा admin@agrinepal.com" required>
              </div>
            </div>
            <div class="auth-input-group">
              <label class="auth-label">पासवर्ड <span class="required">*</span></label>
              <div class="auth-input-wrapper">
                <span class="auth-input-icon">🔒</span>
                <input type="password" class="auth-input" id="adminPassword" placeholder="एडमिन पासवर्ड" required>
              </div>
            </div>
            <button type="submit" class="auth-btn auth-btn-primary auth-btn-lg auth-btn-block" id="adminLoginBtn">लगइन गर्नुहोस् →</button>
          </form>
        </div>

        <!-- Step 2: 2FA -->
        <div id="adminStep2" class="auth-form-step">
          <form class="auth-form" onsubmit="return handleAdmin2FA(event)">
            <div class="auth-2fa-icon">🔐</div>
            <p class="auth-text-center auth-mb-4">तपाईंको फोन नम्बरमा ६ अंकको 2FA कोड पठाइएको छ</p>
            <div class="auth-otp-inputs" id="adminOtpInputs">
              <input type="text" class="auth-otp-input" maxlength="1" inputmode="numeric" pattern="[0-9]" data-otp="0" autofocus>
              <input type="text" class="auth-otp-input" maxlength="1" inputmode="numeric" pattern="[0-9]" data-otp="1">
              <input type="text" class="auth-otp-input" maxlength="1" inputmode="numeric" pattern="[0-9]" data-otp="2">
              <input type="text" class="auth-otp-input" maxlength="1" inputmode="numeric" pattern="[0-9]" data-otp="3">
              <input type="text" class="auth-otp-input" maxlength="1" inputmode="numeric" pattern="[0-9]" data-otp="4">
              <input type="text" class="auth-otp-input" maxlength="1" inputmode="numeric" pattern="[0-9]" data-otp="5">
            </div>
            <button type="submit" class="auth-btn auth-btn-primary auth-btn-lg auth-btn-block auth-mt-4">सत्यापन गर्नुहोस्</button>
          </form>
        </div>

        <!-- Step 3: Admin Dashboard (inline) -->
        <div id="adminStep3" class="auth-form-step">
          <h3 class="mb-4">🛡️ Admin Dashboard</h3>
          <div id="adminDashboardContent"></div>
        </div>
      </div>
    </div>
  </main>
  <footer id="footer" class="footer"></footer>
  <script src="js/data.js"></script><script src="js/utils.js"></script><script src="js/email-service.js"></script><script src="js/auth-system.js"></script><script src="js/auth.js"></script><script src="js/app.js"></script>
  <script>
    let adminUser = null;
    let admin2faOtp = null;

    document.addEventListener('DOMContentLoaded', function() {
      App.init();
      if (Auth.isLoggedIn() && Auth.isAdmin()) showAdminDashboard();
      setupAdminOtpInputs();
    });

    async function handleAdminLogin(e) {
      e.preventDefault();
      const identifier = document.getElementById('adminId').value.trim();
      const password = document.getElementById('adminPassword').value;
      if (!identifier || !password) { showAdminError('सबै फिल्ड भर्नुहोस्'); return false; }

      const btn = document.getElementById('adminLoginBtn');
      btn.disabled = true; btn.textContent = 'लगइन हुँदैछ...';

      const result = await AuthSystem.login(identifier, password, { rememberMe: true });
      btn.disabled = false; btn.textContent = 'लगइन गर्नुहोस् →';

      if (!result.success) { showAdminError(result.message); return false; }
      if (result.user.role !== 'admin') { showAdminError('यो एडमिन खाता होइन'); Auth.logout(); return false; }

      adminUser = result.user;
      admin2faOtp = String(Math.floor(100000 + Math.random() * 900000));
      console.log(`[Admin 2FA] 2FA code generated for: ${result.user.phone}`);
      showAdminSuccess(`2FA कोड ${result.user.phone} मा पठाइयो`);
      document.getElementById('adminStep1').classList.remove('active');
      document.getElementById('adminStep2').classList.add('active');
      document.getElementById('adminTitle').textContent = 'दुई-कारक प्रमाणीकरण';
      document.getElementById('adminSubtitle').textContent = '६ अंकको कोड लेख्नुहोस्';
      return false;
    }

    function handleAdmin2FA(e) {
      e.preventDefault();
      const otp = Array.from(document.querySelectorAll('#adminStep2 .auth-otp-input')).map(i => i.value).join('');
      if (otp.length !== 6) { showAdminError('६ अंकको कोड लेख्नुहोस्'); return false; }
      if (otp !== admin2faOtp) { showAdminError('गलत कोड'); document.querySelectorAll('#adminStep2 .auth-otp-input').forEach(i => i.value = ''); return false; }
      Auth.currentUser = adminUser;
      localStorage.setItem('agri_currentUser', adminUser.id);
      DB.addAuditLog({ action: 'admin_2fa_success', userId: adminUser.id, details: 'Admin 2FA verified', ip: AuthSystem._getIP() });
      showAdminDashboard();
      return false;
    }

    function showAdminDashboard() {
      document.querySelectorAll('.auth-form-step').forEach(s => s.classList.remove('active'));
      document.getElementById('adminStep3').classList.add('active');
      document.getElementById('adminTitle').textContent = '🛡️ Admin Dashboard';
      document.getElementById('adminSubtitle').textContent = `Logged in as ${Auth.currentUser.name}`;

      const pending = AuthSystem.getPendingVerifications();
      const stats = DB.getStats();
      const loginHistory = DB.getLoginHistory(Auth.currentUser.id).slice(0, 5);

      document.getElementById('adminDashboardContent').innerHTML = `
        <div class="stats-grid mb-6" style="grid-template-columns:repeat(2,1fr)">
          <div class="stat-card"><div class="number">${stats.totalUsers}</div><div class="label">Total Users</div></div>
          <div class="stat-card"><div class="number">${stats.verifiedUsers}</div><div class="label">Verified Users</div></div>
          <div class="stat-card"><div class="number">${stats.totalJobs}</div><div class="label">Total Jobs</div></div>
          <div class="stat-card"><div class="number" style="color:#f59e0b">${pending.length}</div><div class="label">Pending Verifications</div></div>
        </div>

        <h4 class="mb-3">🔍 Pending Verifications (${pending.length})</h4>
        ${pending.length ? `<div class="mb-6">${pending.map(doc => {
          const user = DB.getUserById(doc.userId);
          return `<div class="card mb-3"><div class="card-body flex items-center gap-4">
            <div class="flex-1">
              <div class="font-semibold">${user?.name || 'Unknown'} (${user?.phone || ''})</div>
              <div class="text-sm text-muted">${doc.type === 'identity' ? '🪪 Identity' : '🌾 Farm'} - ${doc.docType} - ${doc.docNumber || ''}</div>
              <div class="text-xs text-muted mt-1">${Utils.formatTime(doc.submittedAt)}</div>
            </div>
            <div class="flex gap-2">
              ${doc.filePreview ? `<img src="${doc.filePreview}" style="width:80px;height:60px;object-fit:cover;border-radius:var(--radius);cursor:pointer" onclick="window.open('${doc.filePreview}','_blank')">` : ''}
              <button class="btn btn-primary btn-sm" onclick="reviewDoc('${doc.id}','approved')">✅</button>
              <button class="btn btn-outline btn-sm" onclick="reviewDoc('${doc.id}','rejected')">❌</button>
            </div>
          </div></div>`;
        }).join('')}</div>` : '<p class="text-muted mb-6">No pending verifications</p>'}

        <h4 class="mb-3">📋 Recent Login History</h4>
        <div class="mb-6">${loginHistory.length ? loginHistory.map(h => `<div class="flex items-center gap-3 p-2" style="border-bottom:1px solid var(--border-light)">
          <span style="font-size:1.2rem">${h.success ? '✅' : '❌'}</span>
          <div class="flex-1"><div class="text-sm">${h.identifier || h.phone}</div><div class="text-xs text-muted">${Utils.formatTime(h.timestamp)} - ${h.userAgent?.substring(0, 40) || ''}</div></div>
        </div>`).join('') : '<p class="text-muted">No login history</p>'}</div>

        <div class="flex gap-3">
          <a href="index.html" class="btn btn-outline">🏠 Home</a>
          <button class="btn btn-danger" onclick="AdminLogout()">🚪 Logout</button>
        </div>
      `;
    }

    function reviewDoc(docId, status) {
      const notes = status === 'rejected' ? prompt('Rejection reason (optional):') : '';
      AuthSystem.reviewVerification(docId, status, Auth.currentUser.id, notes);
      DB.addAuditLog({ action: 'verification_reviewed', userId: Auth.currentUser.id, details: `Document ${docId} ${status}` });
      showAdminSuccess(`Document ${status}`);
      showAdminDashboard();
    }

    function AdminLogout() {
      Auth.logout();
    }

    function setupAdminOtpInputs() {
      const inputs = document.querySelectorAll('#adminOtpInputs .auth-otp-input');
      inputs.forEach((input, i) => {
        input.addEventListener('input', function() {
          this.value = this.value.replace(/[^0-9]/g, '');
          if (this.value && i < inputs.length - 1) inputs[i + 1].focus();
          if (i === inputs.length - 1 && this.value) handleAdmin2FA(new Event('submit'));
        });
        input.addEventListener('keydown', function(e) {
          if (e.key === 'Backspace' && !this.value && i > 0) { inputs[i-1].focus(); inputs[i-1].value = ''; }
        });
      });
    }

    function showAdminError(msg) { const el = document.getElementById('adminError'); el.textContent = msg; el.classList.remove('hidden'); document.getElementById('adminSuccess').classList.add('hidden'); }
    function showAdminSuccess(msg) { const el = document.getElementById('adminSuccess'); el.textContent = msg; el.classList.remove('hidden'); document.getElementById('adminError').classList.add('hidden'); }
  </script>
</body>
</html>
