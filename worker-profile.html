<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
  <title>Worker Profile - AgriConnect Nepal</title>
  <link rel="stylesheet" href="css/main.css"><link rel="stylesheet" href="css/components.css"><link rel="stylesheet" href="css/animations.css"><link rel="stylesheet" href="css/responsive.css">
</head>
<body>
  <header id="navbar" class="navbar"></header>
  <main style="margin-top:var(--navbar-height);padding:24px 0;min-height:80vh">
    <div class="container" id="workerProfileContent"></div>
  </main>
  <div class="modal-backdrop" id="reviewModal">
    <div class="modal"><div class="modal-header"><h3>Write Review</h3><span class="modal-close" onclick="Utils.hideModal('reviewModal')">×</span></div><div class="modal-body"></div><div class="modal-footer"></div></div>
  </div>
  <footer id="footer" class="footer"></footer>
  <div class="back-to-top">↑</div>
  <script src="js/data.js"></script><script src="js/utils.js"></script><script src="https://unpkg.com/@supabase/supabase-js@2"></script><script src="js/supabase-auth.js"></script><script src="js/auth-system.js"></script><script src="js/auth.js"></script><script src="js/app.js"></script><script src="js/workers.js"></script><script src="js/notifications.js"></script>
  <script>
    App.init();
    const userId = Utils.getParam('id');
    const user = DB.getUserById(userId);
    const container = document.getElementById('workerProfileContent');
    if (!user) {
      container.innerHTML = '<div class="empty-state" style="padding:80px"><div class="icon">👷</div><h3>Worker Not Found</h3><p>This profile doesn\'t exist or has been removed.</p><a href="workers.html" class="btn btn-primary mt-4">Browse Workers</a></div>';
    } else if (user.role === 'worker') {
      container.innerHTML = Workers.renderWorkerProfile(user);
      document.title = user.name + ' - AgriConnect Nepal';
    } else if (user.role === 'farmer') {
      container.innerHTML = Workers.renderFarmerProfile(user);
      document.title = (user.farmName || user.name) + ' - AgriConnect Nepal';
    } else {
      window.location.href = 'index.html';
    }
  </script>
</body>
</html>
