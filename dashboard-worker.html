<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
  <title>Worker Dashboard - AgriConnect Nepal</title>
  <link rel="stylesheet" href="css/main.css"><link rel="stylesheet" href="css/components.css"><link rel="stylesheet" href="css/dashboard.css"><link rel="stylesheet" href="css/animations.css"><link rel="stylesheet" href="css/responsive.css">
</head>
<body>
  <header id="navbar" class="navbar"></header>
  <div class="dashboard">
    <button class="dashboard-sidebar-toggle" onclick="document.querySelector('.dashboard-sidebar').classList.toggle('open')" aria-label="Toggle menu">☰</button>
    <aside class="dashboard-sidebar">
      <div class="dashboard-sidebar-header"><h3>Worker Panel</h3><p id="sidebarName"></p></div>
      <div class="dashboard-sidebar-section">Menu</div>
      <div class="dashboard-sidebar-nav" id="dashNav">
        <a href="dashboard-worker.html" class="active"><span class="icon">📊</span><span class="nav-text">Dashboard</span></a>
        <a href="jobs.html"><span class="icon">🔍</span><span class="nav-text">Find Jobs</span></a>
        <a href="jobs.html?mode=arma-parma"><span class="icon">🤝</span><span class="nav-text">Arma Parma</span></a>
        <a href="community.html"><span class="icon">👥</span><span class="nav-text">Community</span></a>
        <a href="calendar.html"><span class="icon">📅</span><span class="nav-text">Calendar</span></a>
        <a href="verify-identity.html"><span class="icon">🪪</span><span class="nav-text">Verify Identity</span></a>
        <a href="chat.html"><span class="icon">💬</span><span class="nav-text">Messages</span></a>
        <a href="profile.html" id="profileLink"><span class="icon">👤</span><span class="nav-text">My Profile</span></a>
        <a href="settings.html"><span class="icon">⚙️</span><span class="nav-text">Settings</span></a>
      </div>
      <div class="dashboard-sidebar-section">Account</div>
      <div class="dashboard-sidebar-nav">
        <a href="index.html"><span class="icon">🏠</span><span class="nav-text">Back to Home</span></a>
        <a href="#" onclick="Auth.logout()"><span class="icon">🚪</span><span class="nav-text">Logout</span></a>
      </div>
    </aside>
    <main class="dashboard-main" id="dashboardContent"></main>
  </div>
  <footer id="footer" class="footer"></footer>
  <div class="back-to-top">↑</div>
  <script src="js/data.js"></script><script src="js/utils.js"></script><script src="js/auth-system.js"></script><script src="js/auth.js"></script><script src="js/app.js"></script><script src="js/jobs.js"></script><script src="js/dashboard.js"></script><script src="js/notifications.js"></script>
  <script>
    App.init();
    if (!Auth.requireProfilePhoto()) { /* redirected */ }
    else {
      if (Auth.currentUser) {
        document.getElementById('sidebarName').textContent = Auth.currentUser.name;
        document.getElementById('profileLink').href = 'profile.html?id=' + Auth.currentUser.id;
      }
      Dashboard.renderWorkerDashboard();
    }
  </script>
</body>
</html>
